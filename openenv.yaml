spec_version: 1
name: wasteroute_env
version: "1.0.0"
description: "Urban waste collection environment where an AI agent controls a garbage truck navigating a city graph to collect bins efficiently."
type: space
runtime: fastapi
app: server.app:app
port: 7860
tags:
  - waste-collection
  - routing
  - graph
  - real-world
tasks:
  - name: easy
    description: "5 bins, full fuel, static levels. Collect all bins."
    difficulty: easy
  - name: medium
    description: "15 bins, limited fuel, mixed levels. Prioritize wisely."
    difficulty: medium
  - name: hard
    description: "20 bins, low fuel, dynamic fills, overflow penalties."
    difficulty: hard
